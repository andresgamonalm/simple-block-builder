<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Block Builder · Entrar</title>
<link rel="icon" href="/brand/simple-block-builder.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:"Inter",Arial,sans-serif;background:#040764;color:#fff;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
body{display:flex;align-items:center;justify-content:center;padding:24px;}

.card{background:#fff;color:#1a1a1a;border-radius:14px;padding:32px 32px 28px;max-width:420px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.25);}

.brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.brand-ico{width:42px;height:42px;border-radius:10px;background:#040764;display:flex;align-items:center;justify-content:center;color:#fff;}
.brand-ico svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.brand-text .n{font-size:15px;font-weight:600;color:#040764;}
.brand-text .s{font-size:11px;color:#888;font-weight:400;margin-top:1px;}

h1{font-size:22px;font-weight:600;color:#1a1a1a;margin:0 0 8px;line-height:1.25;}
.sub{font-size:13.5px;color:#666;line-height:1.55;margin:0 0 22px;}

label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
input[type=email]{width:100%;border:1.5px solid #e5e7ea;border-radius:8px;padding:11px 13px;font-size:14px;font-family:inherit;background:#fff;outline:none;transition:border-color .14s;color:#040764;}
input[type=email]:focus{border-color:#040764;}
input[type=email]:disabled{opacity:.6;cursor:not-allowed;}

.btn{width:100%;padding:12px 20px;border:none;border-radius:8px;background:#040764;color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;margin-top:14px;transition:background .14s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover:not(:disabled){background:#1a1d7a;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.btn .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none;}
.btn.loading .spin{display:block;}
@keyframes sp{to{transform:rotate(360deg);}}

.alert{padding:11px 14px;border-radius:8px;font-size:12.5px;line-height:1.45;margin-bottom:16px;display:none;}
.alert.show{display:block;}
.alert.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0;}
.alert.err{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;}

.foot{margin-top:24px;padding-top:18px;border-top:1px solid #f0f0f4;font-size:11.5px;color:#aaa;text-align:center;line-height:1.55;}

.splash{position:fixed;inset:0;background:#040764;display:flex;align-items:center;justify-content:center;color:#fff;z-index:10;}
.splash .spin{width:30px;height:30px;border:2.5px solid rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.85);border-radius:50%;animation:sp .7s linear infinite;}
.splash.hidden{display:none;}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="spin"></div>
</div>

<div class="card" id="card" style="display:none;">
  <div class="brand">
    <div class="brand-ico">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>
    </div>
    <div class="brand-text">
      <div class="n">Simple Block Builder</div>
      <div class="s">By Andrés Gamonal</div>
    </div>
  </div>

  <h1>Entrar al editor</h1>
  <p class="sub">Te enviamos un enlace mágico al correo. Click y entras. Sin contraseñas.</p>

  <div class="alert" id="alert"></div>

  <form id="form" autocomplete="email">
    <label for="email">Tu correo</label>
    <input type="email" id="email" name="email" required autocomplete="email" placeholder="tu@email.com">
    <button type="submit" class="btn" id="btn">
      <span class="spin"></span>
      <span class="lbl">Enviarme el enlace</span>
    </button>
  </form>

  <div class="foot">
    Solo emails autorizados pueden entrar.<br>
    Si no recibes el correo, revisa spam.
  </div>
</div>

<script>
(async () => {
  const splash = document.getElementById("splash");
  const card = document.getElementById("card");

  // Si ya hay sesión, redirigir directo al editor
  try {
    const r = await fetch("/api/whoami", { credentials: "include" });
    if (r.ok) { location.replace("/editor"); return; }
  } catch (e) {}

  splash.classList.add("hidden");
  card.style.display = "block";

  // Mostrar mensaje si volvimos de un verify con error
  const params = new URLSearchParams(location.search);
  const err = params.get("login_error");
  const alertEl = document.getElementById("alert");
  if (err) {
    const map = {
      sin_token: "El enlace no incluye token.",
      invalido: "El enlace no es válido.",
      ya_usado: "Este enlace ya se usó. Pide uno nuevo.",
      expirado: "El enlace expiró. Pide uno nuevo.",
      no_permitido: "Este email no tiene acceso.",
      config: "Configuración del servidor incompleta. Avisa al admin.",
    };
    alertEl.textContent = map[err] || "Hubo un problema con el enlace.";
    alertEl.className = "alert err show";
    history.replaceState({}, "", location.pathname);
  }

  const form = document.getElementById("form");
  const emailInput = document.getElementById("email");
  const btn = document.getElementById("btn");
  const btnLbl = btn.querySelector(".lbl");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = emailInput.value.trim().toLowerCase();
    if (!email) return;

    btn.classList.add("loading");
    btn.disabled = true;
    emailInput.disabled = true;
    btnLbl.textContent = "Enviando...";
    alertEl.classList.remove("show");

    try {
      const r = await fetch("/api/auth/request", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await r.json().catch(() => ({}));

      if (r.ok && data.ok) {
        alertEl.textContent = "Revisa tu correo. Si tu email está autorizado, te enviamos un enlace para entrar (expira en 15 min).";
        alertEl.className = "alert ok show";
        btnLbl.textContent = "Enlace enviado ✓";
      } else {
        alertEl.textContent = data.error || "No se pudo enviar el enlace. Intenta de nuevo.";
        alertEl.className = "alert err show";
        btn.classList.remove("loading");
        btn.disabled = false;
        emailInput.disabled = false;
        btnLbl.textContent = "Enviarme el enlace";
      }
    } catch (e) {
      alertEl.textContent = "Error de red. Verifica tu conexión.";
      alertEl.className = "alert err show";
      btn.classList.remove("loading");
      btn.disabled = false;
      emailInput.disabled = false;
      btnLbl.textContent = "Enviarme el enlace";
    }
  });
})();
</script>

</body>
</html>
