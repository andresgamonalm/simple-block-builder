<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Block Builder · Entrar</title>
<link rel="icon" href="/brand/simple-block-builder.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:"Roboto",Arial,sans-serif;background:#F5F5F5;color:#12173d;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}

/* ── Tarjeta central: foto enmarcada (sin filtros ni capas) + formulario ── */
.tarjeta{display:none;width:100%;max-width:960px;min-height:580px;background:#fff;border-radius:10px;box-shadow:0 12px 44px rgba(18,23,61,.10);padding:14px;grid-template-columns:44% 1fr;gap:0;}
.tarjeta.lista{display:grid;}
.tarjeta-foto{border-radius:10px;overflow:hidden;background:#040764;min-height:220px;}
.tarjeta-foto img{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.tarjeta-foto.sin-foto img{display:none;}
.tarjeta-foto .foto-alt{display:none;width:100%;height:100%;align-items:center;justify-content:center;}
.tarjeta-foto.sin-foto .foto-alt{display:flex;}
.foto-alt svg{width:72px;height:72px;}

.tarjeta-form{display:flex;align-items:center;justify-content:center;padding:40px 28px;}
.form-inner{width:100%;max-width:340px;}
.brand{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:22px;}
.brand svg{width:34px;height:34px;display:block;}
.brand .n{font-size:15px;font-weight:600;letter-spacing:-.01em;}
h1{font-size:23px;font-weight:600;letter-spacing:-.02em;text-align:center;margin:0 0 6px;line-height:1.25;}
h1 b{font-weight:600;color:#040764;}
.sub{font-size:13.5px;color:#6b7180;text-align:center;line-height:1.5;margin:0 0 22px;font-weight:400;}

label{display:block;font-size:11px;font-weight:600;color:#545454;margin:0 0 6px;text-transform:uppercase;letter-spacing:.05em;}
.campo{margin-bottom:14px;}
.campo input{width:100%;height:46px;border:1px solid #dfe2ea;border-radius:10px;padding:0 14px;font-size:14px;font-family:inherit;background:#fff;outline:none;transition:border-color .14s;color:#12173d;}
.campo input:focus{border-color:#040764;}
.campo input:disabled{opacity:.6;cursor:not-allowed;}
.campo-pass{position:relative;}
.campo-pass input{padding-right:46px;}
.ver-pass{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:none;background:none;cursor:pointer;color:#8b91a4;display:flex;align-items:center;justify-content:center;border-radius:8px;}
.ver-pass:hover{color:#040764;background:#F5F5F5;}
.ayuda{display:flex;justify-content:flex-end;margin:-6px 0 16px;}
.ayuda span{font-size:12px;color:#6b7180;}

.btn{width:100%;height:46px;border:none;border-radius:10px;background:#040764;color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;transition:background .14s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover:not(:disabled){background:#04065A;}
.btn:focus-visible{outline:2px solid #378CE3;outline-offset:2px;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.btn .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none;}
.btn.loading .spin{display:block;}
@keyframes sp{to{transform:rotate(360deg);}}

.alert{padding:11px 14px;border-radius:10px;font-size:12.5px;line-height:1.45;margin-bottom:14px;display:none;}
.alert.show{display:block;}
.alert.ok{background:#C2F0D3;color:#0D7332;}
.alert.err{background:#F5D6D6;color:#760A0A;}
.foot{margin-top:22px;font-size:12px;color:#8b91a4;line-height:1.55;text-align:center;}

.splash{position:fixed;inset:0;background:#040764;display:flex;align-items:center;justify-content:center;color:#fff;z-index:10;}
.splash .spin{width:30px;height:30px;border:2.5px solid rgba(255,255,255,.2);border-top-color:rgba(255,255,255,.85);border-radius:50%;animation:sp .7s linear infinite;}
.splash.hidden{display:none;}

/* ── Multidispositivo: tablet apila (foto arriba), móvil compacta ── */
@media(max-width:880px){
  .tarjeta{grid-template-columns:1fr;max-width:480px;min-height:0;}
  .tarjeta-foto{height:190px;min-height:0;}
  .tarjeta-form{padding:28px 18px 22px;}
}
@media(max-width:520px){
  body{padding:14px;}
  .tarjeta-foto{height:140px;}
}
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="spin"></div>
</div>

<div class="tarjeta" id="card">
  <div class="tarjeta-foto" id="foto">
    <img src="/assets/login/foto_login_simple_block_builder.jpg" alt="Sobres de correo ordenados sobre fondo turquesa" onerror="document.getElementById('foto').classList.add('sin-foto')">
    <div class="foto-alt">
      <svg viewBox="0 0 40 40"><rect width="40" height="40" rx="10" fill="#0a0e57"/><rect x="9" y="10" width="22" height="5" rx="2.5" fill="#FCE865"/><rect x="9" y="19" width="9.5" height="11" rx="2.4" fill="#1C73CB"/><rect x="21.5" y="19" width="9.5" height="11" rx="2.4" fill="#20B6B6"/></svg>
    </div>
  </div>

  <div class="tarjeta-form">
    <div class="form-inner">
      <div class="brand">
        <svg viewBox="0 0 40 40"><rect width="40" height="40" rx="10" fill="#040764"/><rect x="9" y="10" width="22" height="5" rx="2.5" fill="#FCE865"/><rect x="9" y="19" width="9.5" height="11" rx="2.4" fill="#1C73CB"/><rect x="21.5" y="19" width="9.5" height="11" rx="2.4" fill="#20B6B6"/></svg>
        <span class="n">Simple Block Builder</span>
      </div>

      <h1>Bienvenido a <b>tu estudio</b></h1>
      <p class="sub">Crea emails, banners y campañas con la identidad de cada marca.</p>

      <div class="alert" id="alert"></div>

      <form id="form" autocomplete="on">
        <div class="campo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="username" required autocomplete="username" placeholder="Escribe tu usuario" autocapitalize="none" spellcheck="false">
        </div>
        <div class="campo campo-pass">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Escribe tu contraseña">
          <button type="button" class="ver-pass" id="ver-pass" title="Mostrar u ocultar la contraseña" aria-label="Mostrar u ocultar la contraseña" style="top:auto;bottom:6px;transform:none;">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12z"/><circle cx="12" cy="12" r="2.6"/></svg>
          </button>
        </div>
        <div class="ayuda"><span>¿Olvidaste tu contraseña? Pídesela al administrador.</span></div>
        <button type="submit" class="btn" id="btn">
          <span class="spin"></span>
          <span class="lbl">Entrar</span>
        </button>
      </form>

      <div class="foot">Solo usuarios autorizados · © Gamonal</div>
    </div>
  </div>
</div>

<script>
(async () => {
  const splash = document.getElementById("splash");
  const card = document.getElementById("card");

  // Si ya hay sesión, redirigir directo al home (dashboard)
  try {
    const r = await fetch("/api/whoami", { credentials: "include" });
    if (r.ok) { location.replace("/home"); return; }
  } catch (e) {}

  splash.classList.add("hidden");
  card.classList.add("lista");

  // Mensajes al volver con error (p. ej. enlaces mágicos viejos, ya desactivados).
  const params = new URLSearchParams(location.search);
  const err = params.get("login_error");
  const alertEl = document.getElementById("alert");
  if (err) {
    alertEl.textContent = (err === "desactivado")
      ? "El acceso por enlace de correo se reemplazó: ahora entra con tu usuario y contraseña."
      : "Hubo un problema al entrar. Usa tu usuario y contraseña.";
    alertEl.className = "alert err show";
    history.replaceState({}, "", location.pathname);
  }

  const form = document.getElementById("form");
  const userInput = document.getElementById("usuario");
  const passInput = document.getElementById("password");
  const btn = document.getElementById("btn");
  const btnLbl = btn.querySelector(".lbl");
  const setBusy = (b) => {
    btn.classList.toggle("loading", b); btn.disabled = b;
    userInput.disabled = b; passInput.disabled = b;
    btnLbl.textContent = b ? "Entrando..." : "Entrar";
  };

  // Mostrar / ocultar contraseña
  document.getElementById("ver-pass").addEventListener("click", () => {
    passInput.type = passInput.type === "password" ? "text" : "password";
    passInput.focus();
  });

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const usuario = userInput.value.trim();
    const password = passInput.value;
    if (!usuario || !password) return;
    setBusy(true);
    alertEl.classList.remove("show");
    try {
      const r = await fetch("/api/auth/login", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, password })
      });
      const data = await r.json().catch(() => ({}));
      if (r.ok && data.ok) { location.replace("/home"); return; }
      alertEl.textContent = data.error || "Usuario o contraseña incorrectos.";
      alertEl.className = "alert err show";
      setBusy(false);
      passInput.value = ""; passInput.focus();
    } catch (e) {
      alertEl.textContent = "Error de red. Verifica tu conexión.";
      alertEl.className = "alert err show";
      setBusy(false);
    }
  });
})();
</script>

</body>
</html>
