<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botón WhatsApp — Simple Block Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── demo (no copiar) ── */
body{margin:0;background:#F5F6F7;font-family:"Roboto",Arial,sans-serif;color:#252525;padding:40px 18px;}
.demo-wrap{max-width:340px;margin:0 auto;display:flex;justify-content:center;}

/* ─────────── COPIAR DESDE AQUÍ ─────────── */
:root{
  --azul:#222F47;
  --celeste:#A3BDCB;
  --borde:#E5E7EA;
}
.sbb-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:32px;
  border:1px solid var(--borde);
  border-radius:999px;
  background:#FAFAFA;
  color:var(--azul);
  padding:7px 14px;
  font-family:"Roboto",Arial,sans-serif;
  font-size:12.3px;
  font-weight:600;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
  transition:background .14s ease,border-color .14s ease,transform .14s ease;
}
.sbb-btn:hover{
  background:rgba(163,189,203,.26);
  border-color:var(--celeste);
  transform:translateY(-1px);
}
/* ─────────── HASTA AQUÍ ─────────── */
</style>
</head>
<body>
<div class="demo-wrap">

<!-- ─────────── COPIAR DESDE AQUÍ ─────────── -->
<a class="sbb-btn" href="https://wa.me/5214772660439" target="_blank" rel="noopener noreferrer">💬 WhatsApp Joaquín</a>
<!-- ─────────── HASTA AQUÍ ─────────── -->

</div>
</body>
</html>
