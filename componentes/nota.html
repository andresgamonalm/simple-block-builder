<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nota — Simple Block Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── demo (no copiar) ── */
body{margin:0;background:#F5F6F7;font-family:"Roboto",Arial,sans-serif;color:#252525;padding:40px 18px;}
.demo-wrap{max-width:540px;margin:0 auto;}

/* ─────────── COPIAR DESDE AQUÍ ─────────── */
:root{
  --azul:#222F47;
  --borde:#E5E7EA;
}
.sbb-note{
  background:rgba(255,255,255,.72);
  border:1px solid var(--borde);
  border-radius:11px;
  padding:7px 9px;
  font-family:"Roboto",Arial,sans-serif;
  font-size:12.5px;
  line-height:1.33;
  color:#444;
}
.sbb-note strong{
  color:var(--azul);
  font-weight:600;
}
/* ─────────── HASTA AQUÍ ─────────── */
</style>
</head>
<body>
<div class="demo-wrap">

<!-- ─────────── COPIAR DESDE AQUÍ ─────────── -->
<div class="sbb-note">
  <strong>Nota:</strong> ingreso mediante código QR (acceso y estacionamiento). Se adjunta el de Amanda y Herbert; el de Álex se enviará el lunes por la mañana.
</div>
<!-- ─────────── HASTA AQUÍ ─────────── -->

</div>
</body>
</html>
